# exp01-01 w_progress — 가설: dense 보상(progress)이 너무 옅어(~0.003/스텝) 조향 학습이 느림.
#   w_progress 1.0→5.0으로 신호를 증폭. potential-based shaping이라 최적 정책은 불변 →
#   "휴리스틱 흉내" 반칙 아님, 순수하게 학습 신호만 강화. (가장 안전한 근본 레버)
#   판독(vs exp01-00): 조향/도달률이 오르면 옅은 보상이 병목이었음.
#
#   python train.py --config configs/exp01-easy-push/exp01-01-w_progress.yaml
group:     exp01-easy-goal
run_name:  exp01-01-w_progress
timesteps: 2000000
n_envs:    8
seed:      0

env:
  goal_dist_min: 2.0
  goal_dist_max: 4.0
  w_progress: 5.0   # baseline 1.0
ppo: {}
