# 가설 검증 — 시간 페널티가 progress를 상쇄해 로버가 "손익분기 속도"에 갇힌 문제
#
#   손익분기 속도 = w_time / (w_progress × dt),  dt = frame_skip×timestep = 0.05s
#     baseline:  0.01  / (1.0 × 0.05) = 0.2 m/s   ← 정책의 실측 명령속도 0.208 m/s와 일치
#     이 설정:   0.001 / (1.0 × 0.05) = 0.02 m/s  ← 거의 모든 움직임이 이득이 됨
#
#   python train.py --config configs/w_time_low.yaml
run_name:  w_time_low
timesteps: 300000
n_envs:    8
seed:      0

env:
  w_time: 0.001   # baseline 0.01의 1/10

ppo: {}
