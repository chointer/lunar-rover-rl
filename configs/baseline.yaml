# 대조군 — 지금까지의 기본 설정 (300k sanity 학습이 도달률 ~5%에 그친 그 설정)
#   python train.py --config configs/baseline.yaml
run_name:  baseline
timesteps: 300000
n_envs:    8
seed:      0

# EnvConfig 덮어쓰기. 여기 없는 필드는 envs/config.py의 기본값을 쓴다.
# (해석된 전체 설정은 experiments/<run>/config.yaml에 기록됨)
env: {}

# PPO 하이퍼파라미터 덮어쓰기. 비우면 SB3 기본값 (lr=3e-4, n_steps=2048, batch=64 ...)
ppo: {}
